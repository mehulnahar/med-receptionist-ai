name: Deploy to Production (AWS)

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: med-receptionist-ai-backend
  APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
  S3_BUCKET: med-receptionist-ai-frontend-prod
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  # ── 1. Backend ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Backend → ECR → App Runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                       -t $REGISTRY/$ECR_REPOSITORY:latest \
                       ./backend
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to App Runner
        env:
          IMAGE_URI: ${{ steps.build.outputs.image }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
          DATABASE_URL_SYNC: ${{ secrets.DATABASE_URL_SYNC_PROD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_PROD }}
          APP_URL_PROD: ${{ secrets.VITE_API_URL_PROD }}
          CORS_ORIGINS_PROD: ${{ secrets.CORS_ORIGINS_PROD }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          cfg = {
            "ImageRepository": {
              "ImageIdentifier": os.environ["IMAGE_URI"],
              "ImageRepositoryType": "ECR",
              "ImageConfiguration": {
                "Port": "8000",
                "RuntimeEnvironmentVariables": {
                  "DATABASE_URL": os.environ["DATABASE_URL"],
                  "DATABASE_URL_SYNC": os.environ["DATABASE_URL_SYNC"],
                  "JWT_SECRET": os.environ["JWT_SECRET"],
                  "APP_ENV": "production",
                  "CORS_ORIGINS": os.environ["CORS_ORIGINS_PROD"],
                  "APP_URL": os.environ["APP_URL_PROD"],
                }
              }
            },
            "AutoDeploymentsEnabled": False
          }
          with open("/tmp/ar_src.json", "w") as f:
            json.dump(cfg, f)
          print("source-config written")
          PYEOF
          aws apprunner update-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --source-configuration file:///tmp/ar_src.json

      - name: Wait for App Runner deployment
        run: |
          echo "Waiting for App Runner service to stabilize..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APP_RUNNER_SERVICE_ARN" \
              --region $AWS_REGION \
              --query 'Service.Status' --output text)
            echo "  Status: $STATUS (attempt $i/30)"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "✅ Backend deployed successfully"
              exit 0
            elif [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "DELETE_FAILED" ]; then
              echo "❌ Deployment failed: $STATUS"
              exit 1
            fi
            sleep 20
          done
          echo "❌ Timeout waiting for App Runner"
          exit 1

  # ── 2. Frontend ────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Frontend → S3 → CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
        run: npm run build

      - name: Upload to S3
        run: |
          aws s3 sync frontend/dist/ s3://$S3_BUCKET \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          # index.html always fresh — no cache
          aws s3 cp frontend/dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"
          echo "✅ Frontend deployed successfully"
